name: Lint
description: Lint with Ruff. Caller must check out the repo before invoking.

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      shell: bash
      run: uv python install 3.13

    - name: Install dependencies
      shell: bash
      run: uv sync --frozen

    - name: Ruff check
      shell: bash
      run: uv run ruff check

    - name: Ruff format check
      shell: bash
      run: uv run ruff format --check
