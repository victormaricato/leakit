name: Test
description: Run the pytest suite with coverage. Caller must check out the repo before invoking.

inputs:
  python-version:
    description: "Python version to test against."
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: uv sync --frozen --python ${{ inputs.python-version }}

    - name: Run tests
      shell: bash
      # -m "" overrides the default 'not integration' filter so the hermetic
      # HTTP integration tests run in CI too.
      run: >-
        uv run --python ${{ inputs.python-version }}
        pytest -n auto --dist=loadscope -m ""
        --junitxml=junit/test-results.xml
        --cov=leakit --cov-report=term --cov-report=xml:coverage.xml

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: pytest-results-${{ inputs.python-version }}
        path: junit/test-results.xml
